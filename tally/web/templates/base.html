<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}tally{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand"><span class="burst" aria-hidden="true"></span>tally</a>
    <nav>
      <a href="/">Today</a>
      <a href="/tracker">Tracker</a>
      <a href="/gallery">Gallery</a>
    </nav>
    <div class="topbar-right">
      <span id="clock" aria-hidden="true"></span>
    </div>
  </header>
  <main>{% block content %}{% endblock %}</main>

  <script>
    // Little menu-bar clock, for the retro-desktop feel.
    (function () {
      var el = document.getElementById("clock");
      if (!el) return;
      function tick() {
        var d = new Date();
        var days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        var h = d.getHours(), m = d.getMinutes();
        var ap = h < 12 ? "AM" : "PM";
        h = h % 12 || 12;
        el.textContent = days[d.getDay()] + " " + h + ":" + (m < 10 ? "0" + m : m) + " " + ap;
      }
      tick();
      setInterval(tick, 10000);
    })();
  </script>
</body>
</html>
