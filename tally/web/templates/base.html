<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}tally{% endblock %}</title>
  <script>
    // Apply the saved palette before first paint so there is no colour flash.
    (function () {
      try {
        var t = localStorage.getItem("tally-theme") || "blue";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) { document.documentElement.setAttribute("data-theme", "blue"); }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand"><span class="burst" aria-hidden="true"></span>tally</a>
    <nav>
      <a href="/">Today</a>
      <a href="/tracker">Tracker</a>
      <a href="/gallery">Gallery</a>
    </nav>
    <div class="topbar-right">
      <div class="themes" role="group" aria-label="Colour palette">
        <button class="swatch" data-theme="red" style="--s:#e5484d" title="Red"></button>
        <button class="swatch" data-theme="orange" style="--s:#ef7d2e" title="Orange"></button>
        <button class="swatch" data-theme="yellow" style="--s:#f4c20d" title="Yellow"></button>
        <button class="swatch" data-theme="green" style="--s:#2f9e63" title="Green"></button>
        <button class="swatch" data-theme="blue" style="--s:#1f86d6" title="Blue"></button>
        <button class="swatch" data-theme="indigo" style="--s:#4b53d8" title="Indigo"></button>
        <button class="swatch" data-theme="violet" style="--s:#9b51e0" title="Violet"></button>
      </div>
      <span id="clock" aria-hidden="true"></span>
    </div>
  </header>
  <main>{% block content %}{% endblock %}</main>

  <script>
    // Palette switcher: persist the choice and mark the active swatch.
    (function () {
      var root = document.documentElement;
      var swatches = Array.prototype.slice.call(document.querySelectorAll(".swatch"));
      function mark() {
        var cur = root.getAttribute("data-theme");
        swatches.forEach(function (s) {
          s.setAttribute("aria-pressed", String(s.dataset.theme === cur));
        });
      }
      swatches.forEach(function (s) {
        s.addEventListener("click", function () {
          root.setAttribute("data-theme", s.dataset.theme);
          try { localStorage.setItem("tally-theme", s.dataset.theme); } catch (e) {}
          mark();
        });
      });
      mark();
    })();
    // Little menu-bar clock, for the retro-desktop feel.
    (function () {
      var el = document.getElementById("clock");
      if (!el) return;
      function tick() {
        var d = new Date();
        var days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        var h = d.getHours(), m = d.getMinutes();
        var ap = h < 12 ? "AM" : "PM";
        h = h % 12 || 12;
        el.textContent = days[d.getDay()] + " " + h + ":" + (m < 10 ? "0" + m : m) + " " + ap;
      }
      tick();
      setInterval(tick, 10000);
    })();
  </script>
</body>
</html>
